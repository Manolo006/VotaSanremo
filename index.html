<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Votazioni Sanremo 2026</title>

<style>

:root{
  --sanremo-blu: #002776;
  --sanremo-blu-light: #0039A6;
  --sanremo-gold: #FFD700;
  --white: #FFFFFF;
  --table-bg: #1a1a30;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background: linear-gradient(135deg, var(--sanremo-blu), var(--sanremo-blu-light));
  color: var(--white);
  padding:20px;
}

h1{
  text-align:center;
  color: var(--sanremo-gold);
  font-size: 2rem;
  margin-bottom:20px;
  text-shadow: 0 0 12px rgba(255,215,0,0.8);
}

.table-container{
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  background: var(--table-bg);
  border-radius:12px;
  overflow:hidden;
}

th, td{
  padding:10px;
  text-align:center;
  border-bottom: 1px solid rgba(255,255,255,0.15);
}

th{
  background: rgba(0,0,60,0.6);
  color: var(--sanremo-gold);
  text-transform: uppercase;
  font-size: 0.9rem;
}

tr:hover{
  background: rgba(255,255,255,0.05);
}

select{
  width:100%;
  padding:6px;
  border-radius:6px;
  border:1px solid var(--sanremo-gold);
  background: var(--sanremo-blu-light);
  color: var(--white);
  font-weight:bold;
}

select option{
  color:#000;
}

button{
  margin-top:25px;
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  font-size:18px;
  font-weight:bold;
  background: var(--sanremo-gold);
  color: var(--sanremo-blu);
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background: var(--white);
  color: var(--sanremo-blu);
  transform: scale(1.03);
}

.message{
  text-align:center;
  margin-top:15px;
  font-weight:bold;
}

.success{ color:#00ffcc; }
.error{ color:#ff4444; }

</style>
</head>
<body>

<h1>🎵 Votazioni Sanremo 2026 🎵</h1>

<div class="table-container">
<table>
<thead>
<tr>
<th>Artista</th>
<th>Outfit</th>
<th>Esibizione</th>
<th>Canzone</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<button onclick="submitVotes()">INVIA TUTTI I VOTI</button>

<div id="message" class="message"></div>

<script type="module">

// ================= ARTISTI 2026 =================

const artists = [
"LDA & AKA 7EVEN",
"DITONELLAPIAGA",
"BAMBOLE DI PEZZA",
"LEO GASSMANN",
"SAL DA VINCI",
"J-AX",
"DARGEN D'AMICO",
"ARISA",
"SAMURAI JAY",
"SERENA BRANCALE",
"EDDIE BROCK",
"ELETTRA LAMBORGHINI",
"FEDEZ & MASINI",
"MARIA ANTONIETTA & COLOMBRE",
"SAYF",
"FULMINACCI",
"LEVANTE",
"ERMAL META",
"PATTY PRAVO",
"MALIKA AYANE",
"MICHELE BRAVI",
"LUCHÈ",
"TOMMASO PARADISO",
"NAYT",
"FRANCESCO RENGA",
"ENRICO NIGIOTTI",
"MARA SATTEI",
"CHIELLO",
"RAF",
"TREDICI PIETRO"
]

// ================= GENERA VOTI =================

function generateVotes(){
    let votes=[]
    for(let i=1;i<=10;i++){
        votes.push(i+"--", i+"-", i, i+"+", i+"++")
        if(i<10) votes.push(i+".5")
    }
    return votes
}

const votesList = generateVotes()

// ================= CREA TABELLA =================

const tableBody = document.getElementById("tableBody")

artists.forEach(artist=>{
    const safeId = artist.replace(/[^a-zA-Z0-9]/g,"_")

    const row = document.createElement("tr")

    row.innerHTML = `
        <td><b>${artist}</b></td>
        <td>${createSelect(safeId,"outfit")}</td>
        <td>${createSelect(safeId,"performance")}</td>
        <td>${createSelect(safeId,"song")}</td>
    `

    tableBody.appendChild(row)
})

function createSelect(id,type){
    let options = '<option value="">-</option>'
    votesList.forEach(v=>{
        options += `<option value="${v}">${v}</option>`
    })
    return `<select id="${id}-${type}">${options}</select>`
}

// ================= FIREBASE =================

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5lQYuX-lCm2Ck3D-JHJ_67G_Tz-L47HI",
  authDomain: "votesanremo.firebaseapp.com",
  databaseURL: "https://votesanremo-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "votesanremo",
  storageBucket: "votesanremo.firebasestorage.app",
  messagingSenderId: "766904786401",
  appId: "1:766904786401:web:00c2b9d223e9bec41906a0"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ================= INVIO =================

async function submitVotes(){

    const message = document.getElementById("message")
    message.className="message"
    message.innerText=""

    let votesData = []

    artists.forEach(artist=>{
        const safeId = artist.replace(/[^a-zA-Z0-9]/g,"_")

        const outfit = document.getElementById(`${safeId}-outfit`).value
        const performance = document.getElementById(`${safeId}-performance`).value
        const song = document.getElementById(`${safeId}-song`).value

        if(outfit || performance || song){
            votesData.push({
                artist,
                outfit,
                performance,
                song
            })
        }
    })

    if(votesData.length === 0){
        message.classList.add("error")
        message.innerText="⚠️ Inserisci almeno un voto!"
        return
    }

    try{
        await push(ref(db,"votes"),{
            votes: votesData,
            timestamp: new Date().toISOString()
        })

        message.classList.add("success")
        message.innerText="✅ Voti inviati con successo!"
    }catch(err){
        message.classList.add("error")
        message.innerText="❌ Errore durante l'invio!"
    }

}

window.submitVotes = submitVotes

</script>

</body>
</html>
