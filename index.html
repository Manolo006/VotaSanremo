<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Votazioni FantaSanremo 2026</title>

<style>

:root{
  --fanta-pink:#ff007f;
  --fanta-purple:#7b00ff;
  --fanta-blue:#00c3ff;
  --dark:#0d001a;
  --card:#1a0033;
  --white:#ffffff;
}

body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,var(--fanta-purple),var(--fanta-blue));
  color:var(--white);
  padding:20px;
}

h1{
  text-align:center;
  font-size:2rem;
  background: linear-gradient(90deg,var(--fanta-pink),var(--fanta-blue));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 20px rgba(255,0,127,0.6);
  margin-bottom:25px;
}

.table-container{
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  background:var(--card);
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 0 25px rgba(255,0,127,0.4);
}

th{
  background: linear-gradient(90deg,var(--fanta-pink),var(--fanta-purple));
  padding:12px;
  font-size:0.9rem;
  text-transform:uppercase;
}

td{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

tr:hover{
  background:rgba(255,255,255,0.05);
}

select{
  width:100%;
  padding:6px;
  border-radius:8px;
  border:2px solid var(--fanta-pink);
  background:#2a004d;
  color:white;
  font-weight:bold;
}

select:focus{
  outline:none;
  box-shadow:0 0 10px var(--fanta-pink);
}

button{
  margin-top:25px;
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  font-size:18px;
  font-weight:bold;
  background: linear-gradient(90deg,var(--fanta-pink),var(--fanta-blue));
  color:white;
  cursor:pointer;
  box-shadow:0 0 15px rgba(255,0,127,0.6);
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px rgba(0,195,255,0.9);
}

.message{
  text-align:center;
  margin-top:15px;
  font-weight:bold;
}

.success{ color:#00ffcc; }
.error{ color:#ff4d4d; }

</style>
</head>
<body>

<h1>🎤 FantaSanremo 2026 – Vota gli Artisti 🎶</h1>

<div class="table-container">
<table>
<thead>
<tr>
<th>Artista</th>
<th>Outfit</th>
<th>Esibizione</th>
<th>Canzone</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<button onclick="submitVotes()">INVIA TUTTI I VOTI</button>

<div id="message" class="message"></div>

<script type="module">

const artists = [
"LDA & AKA 7EVEN",
"DITONELLAPIAGA",
"BAMBOLE DI PEZZA",
"LEO GASSMANN",
"SAL DA VINCI",
"J-AX",
"DARGEN D'AMICO",
"ARISA",
"SAMURAI JAY",
"SERENA BRANCALE",
"EDDIE BROCK",
"ELETTRA LAMBORGHINI",
"FEDEZ & MASINI",
"MARIA ANTONIETTA & COLOMBRE",
"SAYF",
"FULMINACCI",
"LEVANTE",
"ERMAL META",
"PATTY PRAVO",
"MALIKA AYANE",
"MICHELE BRAVI",
"LUCHÈ",
"TOMMASO PARADISO",
"NAYT",
"FRANCESCO RENGA",
"ENRICO NIGIOTTI",
"MARA SATTEI",
"CHIELLO",
"RAF",
"TREDICI PIETRO"
]

function generateVotes(){
    let votes=[]
    for(let i=1;i<=10;i++){
        votes.push(i+"--", i+"-", i, i+"+", i+"++")
        if(i<10) votes.push(i+".5")
    }
    return votes
}

const votesList = generateVotes()
const tableBody = document.getElementById("tableBody")

artists.forEach(artist=>{
    const safeId = artist.replace(/[^a-zA-Z0-9]/g,"_")
    const row = document.createElement("tr")

    row.innerHTML = `
        <td><b>${artist}</b></td>
        <td>${createSelect(safeId,"outfit")}</td>
        <td>${createSelect(safeId,"performance")}</td>
        <td>${createSelect(safeId,"song")}</td>
    `

    tableBody.appendChild(row)
})

function createSelect(id,type){
    let options = '<option value="">-</option>'
    votesList.forEach(v=>{
        options += `<option value="${v}">${v}</option>`
    })
    return `<select id="${id}-${type}">${options}</select>`
}

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5lQYuX-lCm2Ck3D-JHJ_67G_Tz-L47HI",
  authDomain: "votesanremo.firebaseapp.com",
  databaseURL: "https://votesanremo-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "votesanremo",
  storageBucket: "votesanremo.firebasestorage.app",
  messagingSenderId: "766904786401",
  appId: "1:766904786401:web:00c2b9d223e9bec41906a0"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

async function submitVotes(){

    const message = document.getElementById("message")
    message.className="message"
    message.innerText=""

    let votesData = []

    artists.forEach(artist=>{
        const safeId = artist.replace(/[^a-zA-Z0-9]/g,"_")

        const outfit = document.getElementById(`${safeId}-outfit`).value
        const performance = document.getElementById(`${safeId}-performance`).value
        const song = document.getElementById(`${safeId}-song`).value

        if(outfit || performance || song){
            votesData.push({ artist, outfit, performance, song })
        }
    })

    if(votesData.length === 0){
        message.classList.add("error")
        message.innerText="⚠️ Inserisci almeno un voto!"
        return
    }

    try{
        await push(ref(db,"votes"),{
            votes: votesData,
            timestamp: new Date().toISOString()
        })

        message.classList.add("success")
        message.innerText="✅ Voti inviati con successo!"
    }catch(err){
        message.classList.add("error")
        message.innerText="❌ Errore durante l'invio!"
    }

}

window.submitVotes = submitVotes

</script>

</body>
</html>
