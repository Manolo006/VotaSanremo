<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Votazioni Sanremo</title>

<style>
:root{
  --blue:#0B3D91;
  --pink:#E91E63;
  --gold:#FFD700;
  --purple:#6A0DAD;
  --dark:#111122;
  --card:#1c1c2e;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container{
  width:95%;
  max-width:500px;
}

h1{
  text-align:center;
  color:var(--gold);
}

.card{
  background:var(--card);
  padding:20px;
  margin-bottom:15px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
}

select{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:8px;
  border:none;
  font-size:16px;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  font-size:18px;
  font-weight:bold;
  background:linear-gradient(90deg,var(--pink),var(--gold));
  color:black;
  cursor:pointer;
}

.success{
  text-align:center;
  margin-top:10px;
  color:#00ffcc;
}
</style>
</head>
<body>

<div class="container">
<h1>Vota Sanremo</h1>

<div class="card">
<label>Artista</label>
<select id="artist">
<option>Annalisa</option>
<option>Geolier</option>
<option>Angelina Mango</option>
<option>Mahmood</option>
<option>Irama</option>
</select>
</div>

<div class="card">
<label>Outfit</label>
<select id="outfit"></select>
</div>

<div class="card">
<label>Esibizione</label>
<select id="performance"></select>
</div>

<div class="card">
<label>Canzone</label>
<select id="song"></select>
</div>

<button onclick="submitVote()">INVIA VOTO</button>
<div class="success" id="success"></div>

</div>

<script type="module">

function generateVotes(){
    let votes = []
    for(let i=1;i<=10;i++){
        votes.push(i+"--")
        votes.push(i+"-")
        votes.push(i)
        votes.push(i+"+")
        votes.push(i+"++")
        if(i<10) votes.push(i+".5")
    }
    return votes
}

function populate(id){
    const select = document.getElementById(id)
    generateVotes().forEach(v=>{
        let option=document.createElement("option")
        option.value=v
        option.textContent=v
        select.appendChild(option)
    })
}

populate("outfit")
populate("performance")
populate("song")

// FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "INSERISCI",
  authDomain: "INSERISCI",
  projectId: "INSERISCI",
  storageBucket: "INSERISCI",
  messagingSenderId: "INSERISCI",
  appId: "INSERISCI"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function submitVote(){

    const artist = document.getElementById("artist").value
    const outfit = document.getElementById("outfit").value
    const performance = document.getElementById("performance").value
    const song = document.getElementById("song").value

    await addDoc(collection(db,"votes"),{
        artist,
        outfit,
        performance,
        song,
        timestamp: serverTimestamp()
    })

    document.getElementById("success").innerText="Voto inviato!"
}

window.submitVote = submitVote

</script>

</body>
</html>
